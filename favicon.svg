<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff" />
      <stop offset="100%" stop-color="#c7d2fe" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <!-- Left bracket "<" -->
  <text
    x="9"
    y="40"
    font-family="Space Grotesk, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#94a3b8"
  >
    &lt;
  </text>
  <!-- LQD -->
  <text
    x="20"
    y="40"
    font-family="Space Grotesk, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="0"
    fill="#4338ca"
  >
    LQD
  </text>
  <!-- Slash "/" -->
  <text
    x="46"
    y="40"
    font-family="Space Grotesk, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="20"
    font-weight="500"
    fill="#94a3b8"
    fill-opacity="0.7"
  >
    /
  </text>
  <!-- Right bracket ">" -->
  <text
    x="52"
    y="40"
    font-family="Space Grotesk, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#94a3b8"
  >
    &gt;
  </text>
</svg>

